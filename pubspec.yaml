name: real_beauty_ai
description: "Real Beauty — Korean-style skincare app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  url_launcher: ^6.3.2
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.13.0
  permission_handler: ^11.3.1
  flutter_svg: ^2.0.10+1
  flutter_bloc: ^8.1.3
  video_player: ^2.8.7
  visibility_detector: ^0.4.0+2
  shared_preferences: ^2.3.2
  go_router: ^14.0.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.4.4
  cached_network_image: ^3.4.1
  get_it: ^7.7.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^0.3.0
  bloc_test: ^9.1.7

flutter:
  uses-material-design: true
  assets:
    - assets/splash.png
    - assets/banner_skin.jpg
    - assets/products_banner.jpg
    - assets/onboarding.jpg
    - assets/logo.png
    - assets/skin_result_banner.webp
    - assets/products/
    - assets/icons/
    - assets/videos/
    - assets/videos/scan/


    - assets/yoga_avatar.jpg
    - assets/data/
